<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RunRush – Register</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <style>
    body {
      background: radial-gradient(circle at top, #222 0, #000 55%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .auth-card {
      background: #111;
      border-radius: 12px;
      border: 1px solid #333;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .form-control {
      background: #1b1b1b;
      border: 1px solid #333;
      color: #fff;
    }
    .form-control:focus {
      background: #1b1b1b;
      border-color: #F5A623;
      box-shadow: 0 0 0 .2rem rgba(245,166,35,.3);
      color: #fff;
    }
    a { color: #F5A623; text-decoration: none; }
    a:hover { color: #ffc55c; text-decoration: underline; }
  </style>
</head>

<body>
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="d-inline-flex justify-content-center align-items-center mb-2"
           style="width:48px;height:48px;border-radius:999px;border:3px solid #F5A623;font-size:24px;">
        ⚡
      </div>
      <h2 class="mb-1">Create Account</h2>
      <small class="text-muted">RunRush – Track. Improve. Repeat.</small>
    </div>

    {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('register') }}">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username"
               class="form-control"
               required>
      </div>

      <!-- PIN -->
      <label class="form-label">Create New Password</label>
      <div class="input-group mb-3">
        <input name="pin"
               type="password"
               class="form-control"
               required
               minlength="4"
               inputmode="numeric"
               id="regPinInput">
        <button class="btn btn-outline-warning" type="button"
                onclick="const p=document.getElementById('regPinInput'); p.type = p.type==='password'?'text':'password';">
          👁
        </button>
      </div>

      <!-- Submit -->
      <button class="btn btn-warning w-100 mb-3 py-2 fw-bold" style="border-radius:8px;">
        Create account
      </button>
    </form>

    <p class="text-center mb-0">
      Already have an account?
      <a href="{{ url_for('login') }}">Back to login</a>
    </p>
  </div>
</body>
</html>
