<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RunRush – Welcome</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

  <style>
    body {
      background: radial-gradient(circle at top, #222 0, #000 55%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .auth-card {
      background: #111;
      border-radius: 12px;
      border: 1px solid #333;
      padding: 2rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .form-control {
      background: #1b1b1b;
      border: 1px solid #333;
      color: #fff;
    }
    .form-control:focus {
      background: #1b1b1b;
      border-color: #F5A623;
      box-shadow: 0 0 0 .2rem rgba(245,166,35,.3);
      color: #fff;
    }
    .badge-tag {
      background:#222;
      border-radius:999px;
      padding:0.25rem 0.75rem;
      font-size:0.75rem;
      border:1px solid #333;
    }
  </style>
</head>

<body>
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="d-inline-flex justify-content-center align-items-center mb-2"
           style="width:48px;height:48px;border-radius:999px;border:3px solid #F5A623;font-size:24px;">
        ⚡
      </div>
      <h2 class="mb-1">Welcome to RunRush</h2>
      <small class="text-muted">Let’s set up your basics in 10 seconds.</small>
    </div>

    <div class="mb-3 text-center">
      <span class="badge-tag">Logged in as <strong>@{{ username }}</strong></span>
    </div>

    <form method="post" action="{{ url_for('onboarding') }}">
      <!-- Display name -->
      <div class="mb-3">
        <label class="form-label">What should we call you?</label>
        <input name="display_name"
               class="form-control"
               placeholder="e.g. Yajat, BeastRunner, etc.">
        <small class="text-muted">Leave empty to use your username.</small>
      </div>

      <!-- Weight -->
      <div class="mb-3">
        <label class="form-label">Your weight (kg)</label>
        <input name="weight"
               type="number"
               step="0.1"
               min="20"
               max="200"
               class="form-control"
               placeholder="e.g. 62.5">
        <small class="text-muted">Used only to estimate calories burned.</small>
      </div>

      <!-- Weekly goal -->
      <div class="mb-4">
        <label class="form-label">Weekly distance goal (km)</label>
        <input name="weekly_goal"
               type="number"
               step="0.5"
               min="1"
               max="500"
               class="form-control"
               placeholder="e.g. 20">
        <small class="text-muted">You can change this anytime from Weekly Goals section.</small>
      </div>

      <button class="btn btn-warning w-100 py-2 fw-bold mb-2" style="border-radius:8px;">
        Save & Go to Dashboard
      </button>

      <div class="text-center">
        <small class="text-muted">
          You can always edit these later from Settings / Profile.
        </small>
      </div>
    </form>
  </div>
</body>
</html>
